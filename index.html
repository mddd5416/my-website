<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تسجيل الدخول</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- نموذج تسجيل الدخول -->
        <div class="form-box" id="loginForm">
            <h2>تسجيل الدخول</h2>
            <div class="input-group">
                <input type="text" id="loginUser" placeholder="اسم المستخدم" required>
            </div>
            <div class="input-group">
                <input type="password" id="loginPass" placeholder="كلمة المرور" required>
            </div>
            <button onclick="login()">دخول</button>
            <p>ليس لديك حساب؟ <span class="toggle-link" onclick="toggleForm()">إنشاء حساب جديد</span></p>
        </div>

        <!-- نموذج إنشاء حساب -->
        <div class="form-box hidden" id="signupForm">
            <h2>إنشاء حساب</h2>
            <div class="input-group">
                <input type="text" id="regUser" placeholder="اختر اسم مستخدم" required>
            </div>
            <div class="input-group">
                <input type="email" id="regEmail" placeholder="البريد الإلكتروني" required>
            </div>
            <div class="input-group">
                <input type="password" id="regPass" placeholder="كلمة مرور قوية" required>
            </div>
            <button onclick="register()">تسجيل</button>
            <p>لديك حساب بالفعل؟ <span class="toggle-link" onclick="toggleForm()">تسجيل الدخول</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
