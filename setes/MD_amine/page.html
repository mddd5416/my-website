<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة مشاريع محمد أمين</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #0f0f0f;
            --primary: #00ff41; 
            --accent: #00d4ff;
            --danger: #ff4b2b;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* نظام التنقل */
        nav {
            background: #111;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-bottom: 1px solid var(--primary);
        }

        nav button {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        nav button.active {
            background: var(--primary);
            color: #000;
        }

        .section { display: none; padding: 20px; max-width: 1100px; margin: auto; width: 100%; }
        .section.active { display: block; }

        /* ستايل صفحة الإدارة (Admin) */
        .admin-form {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            border: 1px dashed var(--accent);
            margin-bottom: 30px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .btn-add {
            background: var(--accent);
            color: black;
            border: none;
            padding: 10px 25px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }

        /* ستايل بطاقات المشاريع */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 20px;
            border-radius: 12px;
            position: relative;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--primary); transform: translateY(-5px); }

        .card h3 { color: var(--primary); margin-top: 0; }
        
        .tag {
            font-size: 11px;
            background: #1a1a1a;
            padding: 3px 8px;
            border-radius: 4px;
            border: 0.5px solid var(--accent);
            margin-left: 5px;
        }

        .download-link {
            display: block;
            text-align: center;
            background: var(--primary);
            color: black;
            text-decoration: none;
            padding: 8px;
            margin-top: 15px;
            border-radius: 5px;
            font-weight: bold;
        }

        .delete-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
            margin-top: 10px;
        }

        header { text-align: center; padding: 30px; }
        header span { color: var(--primary); }
    </style>
</head>
<body>

<nav>
    <button id="user-nav" class="active" onclick="showSection('user')">واجهة المستخدم</button>
    <button id="admin-nav" onclick="showSection('admin')">لوحة التحكم (Manager)</button>
</nav>

<!-- صفحة المستخدم -->
<div id="user-page" class="section active">
    <header>
        <h1>مشاريع <span>محمد أمين</span></h1>
        <p>استكشف وقم بتحميل أحدث الأدوات والبرمجيات</p>
    </header>
    <div id="projects-list-user" class="grid"></div>
</div>

<!-- صفحة المدير -->
<div id="admin-page" class="section">
    <header>
        <h1>لوحة الإدارة</h1>
        <p>أضف مشاريعك البرمجية الجديدة هنا</p>
    </header>

    <div class="admin-form">
        <input type="text" id="p-title" placeholder="اسم المشروع (مثلاً: OOOS AI)">
        <textarea id="p-desc" placeholder="وصف قصير للمشروع..."></textarea>
        <input type="text" id="p-link" placeholder="رابط التحميل (https://...)">
        <input type="text" id="p-tags" placeholder="اللغات المستخدمة (افصل بينها بفاصلة)">
        <button class="btn-add" onclick="addProject()">نشر المشروع الآن</button>
    </div>

    <div id="projects-list-admin" class="grid"></div>
</div>

<script>
    // جلب البيانات من الذاكرة المحلية
    let projects = JSON.parse(localStorage.getItem('myProjects')) || [];

    function showSection(type) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        
        if(type === 'user') {
            document.getElementById('user-page').classList.add('active');
            document.getElementById('user-nav').classList.add('active');
            renderUserProjects();
        } else {
            document.getElementById('admin-page').classList.add('active');
            document.getElementById('admin-nav').classList.add('active');
            renderAdminProjects();
        }
    }

    function addProject() {
        const title = document.getElementById('p-title').value;
        const desc = document.getElementById('p-desc').value;
        const link = document.getElementById('p-link').value;
        const tags = document.getElementById('p-tags').value.split(',');

        if(title && desc && link) {
            const newProject = { id: Date.now(), title, desc, link, tags };
            projects.push(newProject);
            localStorage.setItem('myProjects', JSON.stringify(projects));
            
            // تنظيف الحقول
            document.getElementById('p-title').value = '';
            document.getElementById('p-desc').value = '';
            document.getElementById('p-link').value = '';
            document.getElementById('p-tags').value = '';
            
            renderAdminProjects();
            alert("تمت إضافة المشروع بنجاح!");
        } else {
            alert("يرجى ملء البيانات الأساسية.");
        }
    }

    function deleteProject(id) {
        projects = projects.filter(p => p.id !== id);
        localStorage.setItem('myProjects', JSON.stringify(projects));
        renderAdminProjects();
    }

    function renderUserProjects() {
        const container = document.getElementById('projects-list-user');
        container.innerHTML = projects.map(p => `
            <div class="card">
                <h3>${p.title}</h3>
                <p>${p.desc}</p>
                <div>${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                <a href="${p.link}" class="download-link" target="_blank">تحميل مباشر</a>
            </div>
        `).join('');
    }

    function renderAdminProjects() {
        const container = document.getElementById('projects-list-admin');
        container.innerHTML = projects.map(p => `
            <div class="card">
                <h3>${p.title}</h3>
                <p>${p.desc}</p>
                <button class="delete-btn" onclick="deleteProject(${p.id})">حذف المشروع</button>
            </div>
        `).join('');
    }

    // التشغيل الأولي
    renderUserProjects();
</script>

</body>
</html>
