<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | ROOT Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f8f9fa;
            --sidebar: #ffffff;
            --text: #202124;
            --border: #dadce0;
            --danger: #d93025;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Arabic', sans-serif; }
        body { background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* الحماية: إخفاء المحتوى حتى يتم التأكد من الدخول */
        #main-wrapper { display: none; width: 100%; height: 100%; grid-template-columns: 280px 1fr; }

        .sidebar { background: var(--sidebar); border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 0; }
        .nav-item { padding: 12px 24px; cursor: pointer; color: #5f6368; transition: 0.2s; border-radius: 0 25px 25px 0; margin: 4px 10px; }
        .nav-item:hover, .nav-item.active { background: #e8f0fe; color: var(--primary); font-weight: 500; }

        .content { flex: 1; padding: 40px; overflow-y: auto; }
        .card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 24px; margin-bottom: 24px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 4px; outline: none; }
        input:focus { border: 2px solid var(--primary); padding: 9px; }

        .btn { background: var(--primary); color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: 500; }
        .btn-danger { background: var(--danger); }

        .section { display: none; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="main-wrapper">
        <aside class="sidebar">
            <div style="padding: 20px; text-align: center;">
                <h2 style="color: var(--primary);">ROOT</h2>
                <p style="font-size: 12px; color: #5f6368;">لوحة التحكم الاحترافية</p>
            </div>
            <nav style="flex: 1;">
                <div class="nav-item active" onclick="showSec('publish', this)">➕ إضافة مشروع</div>
                <div class="nav-item" onclick="showSec('manage', this)">🛠 إدارة المشاريع</div>
                <div class="nav-item" onclick="showSec('security', this)">🔐 إعدادات الأمان</div>
            </nav>
            <div class="nav-item" style="color: var(--danger);" onclick="logout()">🚪 خروج</div>
        </aside>

        <main class="content">
            <section id="publish" class="section active">
                <div class="card">
                    <h3>نشر تطبيق جديد</h3>
                    <div class="form-group"><label>اسم التطبيق</label><input type="text" id="p-title"></div>
                    <div class="form-group"><label>الوصف</label><textarea id="p-desc" rows="3"></textarea></div>
                    <button class="btn" onclick="publishProject()">نشر الآن</button>
                </div>
            </section>

            <section id="security" class="section">
                <div class="card">
                    <h3>تعديل بيانات الدخول (المانجر)</h3>
                    <div class="form-group"><label>اسم المستخدم الجديد</label><input type="text" id="new-admin-user"></div>
                    <div class="form-group"><label>كلمة المرور الجديدة</label><input type="password" id="new-admin-pass"></div>
                    <button class="btn" onclick="updateAdminAuth()">تحديث بيانات المانجر</button>
                </div>

                <div class="card">
                    <h3>تعديل دخول الزوار (Invite)</h3>
                    <div class="form-group"><label>كلمة مرور الزوار الحالية</label><input type="text" id="new-invite-pass"></div>
                    <button class="btn" onclick="updateInviteAuth()">تحديث كلمة سر الزوار</button>
                </div>
            </section>
        </main>
    </div>

    <script src="manage_panel_script.js"></script>
</body>
</html>
