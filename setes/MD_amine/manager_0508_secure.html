<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الإدارة </title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="manager-style.css">
</head>
<body class="light-mode" id="body-root">

    <div id="login-overlay" class="overlay">
        <div class="auth-box">
            <h2>تسجيل دخول الإدارة</h2>
            <input type="text" id="user-in" placeholder="اسم المستخدم">
            <input type="password" id="pass-in" placeholder="كلمة المرور">
            <button class="btn-main" onclick="app.login()">دخول</button>
        </div>
    </div>

    <div id="app-wrapper" style="display: none;">
        <aside id="main-sidebar" class="sidebar">
            <div class="sidebar-top">
                <div class="profile-trigger" onclick="app.showProfile()">
                    <img id="side-avatar" src="https://via.placeholder.com/80" alt="Profile">
                </div>
                <nav class="nav-menu">
                    <button class="nav-link active" onclick="app.setTab('publish')"><span>➕</span> إضافة مشروع</button>
                    <button class="nav-link" onclick="app.setTab('manage')"><span>🛠</span> التحكم والعديل</button>
                    <button class="nav-link" onclick="app.setTab('stats')"><span>📈</span> مستوى التقدم</button>
                </nav>
            </div>
            <div class="sidebar-bottom">
                <button class="nav-link" onclick="app.setTab('settings')"><span>⚙️</span> الإعدادات</button>
            </div>
        </aside>

        <div id="profile-view" class="profile-center-view" style="display: none;">
            <button class="btn-back" onclick="app.hideProfile()">⬅ العودة للوحة التحكم</button>
            <div class="profile-card">
                <div class="avatar-edit">
                    <img id="large-avatar" src="https://via.placeholder.com/120">
                    <button class="edit-icon" onclick="document.getElementById('file-avatar').click()">✎</button>
                    <input type="file" id="file-avatar" hidden onchange="app.updateAvatar(this)">
                </div>
                
                <div class="info-group">
                    <label>الاسم المستعار</label>
                    <div class="input-with-btn">
                        <input type="text" id="prof-name" readonly>
                        <button onclick="app.toggleEdit('prof-name')">✎</button>
                    </div>
                </div>

                <div class="info-group">
                    <label>اسم المستخدم</label>
                    <div class="input-with-btn">
                        <input type="text" id="prof-user" readonly>
                        <button onclick="app.toggleEdit('prof-user')">✎</button>
                    </div>
                </div>

                <div class="info-group">
                    <label>الوصف الشخصي</label>
                    <div class="input-with-btn">
                        <textarea id="prof-bio" readonly></textarea>
                        <button onclick="app.toggleEdit('prof-bio')">✎</button>
                    </div>
                </div>

                <button class="btn-outline" onclick="app.changePasswordPrompt()">تغيير كلمة السر</button>
            </div>
        </div>

        <main id="content-area" class="workspace">
            
            <section id="tab-publish" class="panel active">
                <div class="card">
                    <h2 id="form-title">نشر تطبيق جديد</h2>
                    <input type="hidden" id="edit-id">
                    
                    <div class="grid-2">
                        <input type="text" id="p-title" placeholder="اسم التطبيق">
                        <input type="text" id="p-type" placeholder="نوع المنصة">
                    </div>
                    <textarea id="p-desc" placeholder="وصف التطبيق..." rows="3"></textarea>

                    <div class="upload-section">
                        <label>أيقونة التطبيق الرئيسي:</label>
                        <input type="file" id="p-icon" class="file-input">
                    </div>

                    <div class="upload-section">
                        <label>سكرينشوتات من داخل التطبيق:</label>
                        <input type="file" id="p-screens" class="file-input" multiple onchange="app.previewScreens(this)">
                        <div id="screens-preview-box" class="preview-grid"></div>
                    </div>

                    <div id="links-wrapper">
                        <label>أزرار التحميل:</label>
                        <div class="link-row">
                            <input type="text" class="l-url" placeholder="الرابط">
                            <input type="text" class="l-txt" placeholder="اسم الزر">
                            <button class="btn-add-mini" onclick="app.addLinkRow()">+</button>
                        </div>
                    </div>

                    <button class="btn-main" style="width: 100%; margin-top: 20px;" onclick="app.saveProject()">حفظ ونشر المشروع</button>
                </div>
            </section>

            <section id="tab-manage" class="panel">
                <div class="card">
                    <h3>إدارة المنشورات الحالية</h3>
                    <div id="projects-list-admin"></div>
                </div>
            </section>

            <section id="tab-stats" class="panel">
                <div class="stats-grid">
                    <div class="stat-card"> <h1 id="stat-views">0</h1> <p>إجمالي المشاهدات</p> </div>
                    <div class="stat-card"> <h1 id="stat-dl">0</h1> <p>إجمالي التحميلات</p> </div>
                </div>
            </section>

            <section id="tab-settings" class="panel">
                <div class="card">
                    <h3>التخصيص</h3>
                    <div class="setting-row">
                        <span>المظهر الداكن</span>
                        <input type="checkbox" onchange="app.toggleDarkMode(this)">
                    </div>
                    <div class="setting-row">
                        <span>اللغة</span>
                        <select onchange="app.changeLang(this.value)">
                            <option value="ar">العربية</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="Mscript.js"></script>
</body>
</html>
