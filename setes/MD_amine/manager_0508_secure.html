<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | محمد أمين</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #1a73e8; --g-red: #ea4335; --g-gray: #5f6368; --bg: #ffffff; --border: #dadce0; --card: #ffffff; }
        [data-theme="dark"] { --bg: #202124; --card: #292a2d; --border: #3c4043; }
        * { box-sizing: border-box; font-family: 'Google Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--g-gray); height: 100vh; overflow: hidden; }
        
        #auth-layer { position: fixed; inset: 0; background: #fff; z-index: 1000; display: flex; align-items: center; justify-content: center; text-align: center; }
        #main-app { display: none; grid-template-columns: 280px 1fr; height: 100vh; }
        
        .sidebar { background: var(--card); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-user { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .avatar-box { position: relative; width: 85px; height: 85px; margin: 0 auto 10px; cursor: pointer; border: 3px solid var(--g-blue); border-radius: 50%; overflow: hidden; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .nav-item { padding: 14px 24px; margin: 4px 8px; border: none; background: transparent; cursor: pointer; text-align: right; border-radius: 0 25px 25px 0; font-weight: 500; transition: 0.2s; }
        .nav-item.active { background: #e8f0fe; color: var(--g-blue); }

        .workspace { padding: 30px; overflow-y: auto; height: 100vh; }
        .panel { display: none; max-width: 900px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .panel.active { display: block; }

        .g-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0 20px; border: 1px solid var(--border); border-radius: 8px; }
        .btn-g { background: var(--g-blue); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 500; }
        
        .project-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid var(--border); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="auth-layer">
        <div>
            <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" width="100">
            <h3>تسجيل دخول المدير</h3>
            <input type="text" id="login-u" placeholder="اسم المستخدم">
            <input type="password" id="login-p" placeholder="كلمة المرور">
            <button class="btn-g" style="width:100%" id="btn-login-exec">دخول</button>
        </div>
    </div>

    <div id="main-app">
        <aside class="sidebar">
            <div class="sidebar-user">
                <div class="avatar-box" id="avatar-trigger">
                    <img id="admin-avatar" src="https://via.placeholder.com/85">
                </div>
                <input type="file" id="f-avatar" hidden accept="image/*">
                <h4 id="admin-name-display" style="margin:5px 0 0">محمد أمين</h4>
            </div>
            <nav style="flex:1">
                <button class="nav-item active" onclick="uiTab('view-add', this)">➕ إضافة جديد</button>
                <button class="nav-item" onclick="uiTab('view-list', this)">🛠 إدارة المنشورات</button>
                <button class="nav-item" onclick="uiTab('view-set', this)">⚙️ الإعدادات</button>
            </nav>
        </aside>
        <main class="workspace">
            <section id="view-add" class="panel active">
                <div class="g-card">
                    <h3 id="form-title">نشر تطبيق جديد</h3>
                    <input type="hidden" id="edit-id">
                    <input type="text" id="p-title" placeholder="اسم التطبيق">
                    <input type="text" id="p-type" placeholder="التصنيف (مثال: برامج ويندوز)">
                    <textarea id="p-desc" placeholder="وصف موجز للمشروع..." rows="4"></textarea>
                    <label>الأيقونة:</label> <input type="file" id="f-icon">
                    <div id="links-area">
                        <label>الروابط:</label>
                        <div style="display:flex; gap:10px;">
                            <input type="text" class="l-url" placeholder="رابط التحميل">
                            <input type="text" class="l-txt" placeholder="نص الزر">
                        </div>
                    </div>
                    <button class="btn-g" style="width:100%; margin-top:20px;" id="btn-pub-exec">حفظ ونشر</button>
                </div>
            </section>
            <section id="view-list" class="panel">
                <div class="g-card">
                    <h3>كل المنشورات</h3>
                    <div id="manager-list"></div>
                </div>
            </section>
            <section id="view-set" class="panel">
                <div class="g-card">
                    <h3>تحديث الحساب</h3>
                    <input type="text" id="up-name" placeholder="الاسم الجديد">
                    <input type="password" id="up-pass" placeholder="كلمة مرور جديدة">
                    <button class="btn-g" id="btn-up-exec">تحديث البيانات</button>
                </div>
            </section>
        </main>
    </div>
    <script src="Mscript.js"></script>
</body>
</html>
