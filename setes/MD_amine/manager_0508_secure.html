<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم النابضة</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .box { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 600px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 12px; outline: none; transition: 0.3s; }
        input:focus { border-color: #1a73e8; }
        
        .preview-container { text-align: center; margin-bottom: 20px; display: none; padding: 10px; border: 2px dashed #1a73e8; border-radius: 12px; }
        .preview-container img { max-width: 100px; border-radius: 10px; }
        
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="login-section" class="box">
        <h2>أهلاً محمد أمين</h2>
        <input type="password" id="access-key" placeholder="كلمة المرور: MDaMiNeLD">
        <button onclick="unlock()">فتح اللوحة</button>
    </div>

    <div id="admin-section" class="box hidden">
        <h2>مشروع جديد</h2>
        <div id="image-preview" class="preview-container">
            <p>معاينة الأيقونة:</p>
            <img id="img-render" src="">
        </div>
        
        <input type="text" id="p-icon" placeholder="ضع رابط الصورة للمعاينة..." oninput="previewImage(this.value)">
        <input type="text" id="p-title" placeholder="اسم المشروع">
        <textarea id="p-desc" placeholder="شرح المشروع..."></textarea>
        <input type="text" id="p-link" placeholder="الرابط">
        <input type="text" id="p-btn" placeholder="نص الزر">
        <button onclick="pushData()">نشر المشروع (لن يعمل الرابط في المعاينة)</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="Mscript.js"></script>
    <script>
        function previewImage(url) {
            const container = document.getElementById('image-preview');
            const img = document.getElementById('img-render');
            if(url.length > 5) {
                container.style.display = 'block';
                img.src = url;
            } else {
                container.style.display = 'none';
            }
        }
    </script>
</body>
</html>
