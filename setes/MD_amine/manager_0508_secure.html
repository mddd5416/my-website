<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> محمد أمين</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0a0a12; --card: #11111d; --accent: #3699ff; --text: #ffffff; --border: #1f1f30; }
        [data-theme="light"] { --bg: #f8f9fa; --card: #ffffff; --accent: #0061f2; --text: #1a1a1b; --border: #d1d9e6; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); direction: rtl; }

        /* شاشة الدخول */
        #auth-layer { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--border); width: 320px; text-align: center; }

        /* الهيكل الرئيسي */
        #main-app { display: none; grid-template-columns: 260px 1fr; min-height: 100vh; }
        .sidebar { background: var(--card); border-left: 1px solid var(--border); padding: 25px; position: sticky; top: 0; height: 100vh; box-sizing: border-box; }
        .sidebar-head { text-align: center; margin-bottom: 40px; }
        .sidebar-head img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; }

        .nav-link { display: block; width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 12px; background: transparent; color: #a2a3b7; cursor: pointer; text-align: right; transition: 0.3s; }
        .nav-link.active, .nav-link:hover { background: var(--accent); color: white; }

        .workspace { padding: 40px; overflow-y: auto; }
        .panel { display: none; }
        .panel.active { display: block; animation: fadeIn 0.4s ease; }

        .card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 10px; background: #07070c; color: #fff; box-sizing: border-box; outline: none; }
        .btn-kick { background: var(--accent); color: #fff; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }

        .preview-grid { display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0; }
        .thumb { position: relative; width: 85px; height: 85px; }
        .thumb img { width: 100%; height: 100%; border-radius: 10px; object-fit: cover; border: 1px solid var(--accent); }
        .del-x { position: absolute; top: -5px; right: -5px; background: #f64e60; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-layer">
        <div class="auth-box">
            <h2 style="color:var(--accent)">ROOT ACCESS</h2>
            <input type="text" id="login-u" placeholder="اسم المستخدم">
            <input type="password" id="login-p" placeholder="كلمة المرور">
            <button class="btn-kick" id="btn-login">دخول</button>
        </div>
    </div>

    <div id="main-app">
        <aside class="sidebar">
            <div class="sidebar-head">
                <img id="admin-avatar" src="https://via.placeholder.com/80">
                <h3 id="admin-display-name">محمد أمين</h3>
            </div>
            <button class="nav-link active" onclick="uiNav('view-post', this)">➕ مشروع جديد</button>
            <button class="nav-link" onclick="uiNav('view-user', this)">👤 الحساب</button>
            <button class="nav-link" onclick="uiNav('view-stats', this)">📊 الإحصائيات</button>
            <button class="nav-link" onclick="uiTheme()">🌓 الوضع الليلي</button>
        </aside>

        <main class="workspace">
            <section id="view-post" class="panel active">
                <div class="card">
                    <h3>🚀 نشر مشروع جديد</h3>
                    <input type="text" id="p-type" placeholder="التصنيف">
                    <input type="text" id="p-title" placeholder="اسم المشروع">
                    
                    <label>الأيقونة:</label>
                    <input type="file" id="f-icon" hidden>
                    <button type="button" onclick="document.getElementById('f-icon').click()">رفع ملف</button>
                    <div id="prev-icon" class="preview-grid"></div>

                    <textarea id="p-desc" placeholder="وصف المشروع..." rows="5"></textarea>

                    <label>صور المعرض:</label>
                    <input type="file" id="f-screens" hidden multiple>
                    <button type="button" onclick="document.getElementById('f-screens').click()">إضافة صور</button>
                    <div id="prev-screens" class="preview-grid"></div>

                    <div id="links-area">
                        <label>الروابط:</label>
                        <div style="display:flex; gap:10px; margin-bottom:10px;">
                            <input type="text" class="l-url" placeholder="الرابط">
                            <input type="text" class="l-txt" placeholder="نص الزر">
                            <button type="button" onclick="uiAddLink()" style="background:var(--accent); color:white; width:45px; border-radius:10px; border:none;">+</button>
                        </div>
                    </div>

                    <button id="pub-btn" class="btn-kick">🚀 تنفيذ النشر</button>
                </div>
            </section>

            <section id="view-user" class="panel">
                <div class="card">
                    <h3>👤 إعدادات الحساب</h3>
                    <input type="text" id="up-name" placeholder="الاسم الجديد">
                    <input type="text" id="up-user" placeholder="اليوزر الجديد">
                    <input type="password" id="up-pass" placeholder="الباسورد الجديد">
                    <button class="btn-kick" onclick="engineUpdateProfile()">حفظ</button>
                </div>
            </section>

            <section id="view-stats" class="panel">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div class="card" style="text-align:center;"> <h1 id="stat-v">0</h1> <p>مشاهدات</p> </div>
                    <div class="card" style="text-align:center;"> <h1 id="stat-d">0</h1> <p>تحميلات</p> </div>
                </div>
            </section>
        </main>
    </div>

    <script src="Mscript.js"></script>
</body>
</html>
