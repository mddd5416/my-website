<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة النظام | محمد أمين</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; min-height: 100vh; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none; }
        .box { background: #0a0a0a; border: 1px solid #00ff41; padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; box-shadow: 0 0 20px rgba(0,255,65,0.1); }
        input, textarea, select { width: 100%; background: #000; border: 1px solid #333; color: #00ff41; padding: 12px; margin-bottom: 15px; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background: #00ff41; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 6px; font-size: 1rem; }
        .proj-item { background: #111; border: 1px solid #222; padding: 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; }
        .del-btn { background: #ff4444; width: auto; padding: 5px 15px; color: white; }
    </style>
</head>
<body>

    <div id="login-section" class="box">
        <h2 style="text-align: center;">ROOT ACCESS</h2>
        <input type="password" id="access-key" placeholder="كلمة المرور الخاصة بك...">
        <button onclick="unlock()">دخول للنظام</button>
    </div>

    <div id="admin-section" class="box hidden">
        <h2 style="text-align: center;">لوحة التحكم الشاملة</h2>
        
        <input type="text" id="p-title" placeholder="اسم المشروع (مثلاً: OOOS AI)">
        <select id="p-type">
            <option value="تطبيق أندرويد">تطبيق أندرويد</option>
            <option value="موقع ويب">موقع ويب</option>
            <option value="بوت تلغرام">بوت تلغرام</option>
            <option value="سكربت برمج">سكربت برمجي</option>
            <option value="أداة OSINT">أداة OSINT</option>
        </select>
        <textarea id="p-desc" placeholder="وصف المشروع بدقة..." rows="3"></textarea>
        <input type="text" id="p-link" placeholder="الرابط المباشر (رابط خارجي)">
        <input type="text" id="p-icon" placeholder="رابط الأيقونة (URL)">
        <input type="text" id="p-tech" placeholder="اللغات المستخدمة (Python, Go...)">
        
        <button onclick="pushData()">نشر المشروع الآن</button>
        <p id="status" style="text-align:center;"></p>

        <hr style="border: 0.5px solid #222; margin: 30px 0;">
        <h3>إدارة المشاريع الحالية</h3>
        <div id="admin-list"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="Mscript.js"></script>
</body>
</html>
