<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة المحتوى | محمد أمين</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .hidden { display: none; }
        .box { background: #0a0a0a; border: 1px solid #00ff41; padding: 30px; border-radius: 10px; width: 400px; box-shadow: 0 0 20px rgba(0,255,65,0.1); }
        input, textarea { width: 100%; background: #000; border: 1px solid #333; color: #00ff41; padding: 12px; margin-bottom: 15px; border-radius: 5px; box-sizing: border-box; }
        input:focus { border-color: #00ff41; outline: none; }
        button { width: 100%; background: #00ff41; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:hover { background: #00cc33; }
        #status { text-align: center; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <!-- واجهة الدخول -->
    <div id="login-section" class="box">
        <h2 style="text-align: center;">ROOT ACCESS</h2>
        <input type="password" id="access-key" placeholder="كلمة المرور...">
        <button onclick="unlock()">فتح النظام</button>
    </div>

    <!-- واجهة إضافة المشاريع -->
    <div id="admin-section" class="box hidden">
        <h2 style="text-align: center;">إضافة مشروع جديد</h2>
        <input type="text" id="p-title" placeholder="اسم المشروع (مثلاً: OOOS AI)">
        <textarea id="p-desc" placeholder="وصف المشروع..." rows="4"></textarea>
        <input type="text" id="p-link" placeholder="رابط التحميل المباشر">
        <input type="text" id="p-tech" placeholder="التقنيات (Python, Flutter...)">
        <button onclick="pushData()">نشر في الموقع</button>
        <p id="status"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let client = null;
        const sUrl = 'https://ibqvftckjsyfnyembggc.supabase.co';
        const sKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlicXZmdGNranN5Zm55ZW1iZ2djIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNDI3OTUsImV4cCI6MjA5MzkxODc5NX0.EQNGQz5ckjFa-2b0sFpZ6AWhWkYDl0YP5noN7vAcGK4';

        function unlock() {
            const pass = document.getElementById('access-key').value;
            if(pass === "MDaMiNeLD") { // كلمة مرورك الخاصة
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-section').classList.remove('hidden');
                client = supabase.createClient(sUrl, sKey);
            } else {
                alert("تم رفض الوصول!");
            }
        }

        async function pushData() {
            const status = document.getElementById('status');
            status.innerText = "جاري النشر...";
            
            const { error } = await client.from('projects').insert([{
                title: document.getElementById('p-title').value,
                desc: document.getElementById('p-desc').value,
                link: document.getElementById('p-link').value,
                tech: document.getElementById('p-tech').value
            }]);

            if(!error) {
                status.style.color = "#00ff41";
                status.innerText = "تم النشر بنجاح!";
                document.querySelectorAll('input, textarea').forEach(el => el.value = '');
            } else {
                status.style.color = "red";
                status.innerText = "خطأ: " + error.message;
            }
        }
    </script>
</body>
</html>
