<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | محمد أمين</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0b0b14; --card: #12121f; --accent: #3699ff; --text: #ffffff; --border: #242435; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); direction: rtl; }
        
        /* شاشة الدخول */
        #auth-layer { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--border); width: 300px; text-align: center; }
        
        /* اللوحة الرئيسية */
        #main-app { display: none; padding: 40px; }
        .glass-card { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--border); max-width: 600px; margin: auto; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; box-sizing: border-box; }
        .btn-kick { background: var(--accent); color: #fff; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-kick:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div id="auth-layer">
        <div class="auth-box">
            <h2 style="color:var(--accent)">تسجيل الدخول</h2>
            <input type="text" id="u-name" placeholder="اسم المستخدم">
            <input type="password" id="u-pass" placeholder="كلمة المرور">
            <button class="btn-kick" onclick="runLogin()">دخول النظام</button>
        </div>
    </div>

    <div id="main-app">
        <div class="glass-card">
            <h3>نشر مشروع جديد</h3>
            <input type="text" id="p-title" placeholder="اسم المشروع">
            <textarea id="p-desc" placeholder="الوصف" rows="4"></textarea>
            <button id="p-btn" class="btn-kick" onclick="runPublish()">🚀 نشر الآن</button>
            <p id="status" style="text-align:center; color: var(--accent);"></p>
        </div>
    </div>

    <script>
        // إعدادات Supabase
        const _URL = 'https://ibqvftckjsyfnyembggc.supabase.co';
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlicXZmdGNranN5Zm55ZW1iZ2djIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNDI3OTUsImV4cCI6MjA5MzkxODc5NX0.EQNGQz5ckjFa-2b0sFpZ6AWhWkYDl0YP5noN7vAcGK4';
        const supabaseClient = supabase.createClient(_URL, _KEY);

        // 1. دالة الدخول
        function runLogin() {
            const user = document.getElementById('u-name').value;
            const pass = document.getElementById('u-pass').value;

            // التأكد من جلب البيانات من التخزين أو استخدام الافتراضي
            const validUser = localStorage.getItem('admin_user') || "admin";
            const validPass = localStorage.getItem('admin_pass') || "MDaMiNeLD";

            if (user === validUser && pass === validPass) {
                document.getElementById('auth-layer').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                console.log("Login Success");
            } else {
                alert("بيانات خاطئة!");
            }
        }

        // 2. دالة النشر
        async function runPublish() {
            const btn = document.getElementById('p-btn');
            const title = document.getElementById('p-title').value;
            const desc = document.getElementById('p-desc').value;

            if (!title) return alert("أدخل العنوان!");

            btn.disabled = true;
            btn.innerText = "جاري النشر...";

            try {
                const { error } = await supabaseClient.from('projects').insert([{
                    title: title,
                    "desc": desc,
                    views: 0,
                    downloads: 0
                }]);

                if (error) throw error;

                document.getElementById('status').innerText = "✅ تم النشر بنجاح!";
                setTimeout(() => location.reload(), 2000);
            } catch (err) {
                alert("خطأ: " + err.message);
                btn.disabled = false;
                btn.innerText = "🚀 نشر الآن";
            }
        }
    </script>
</body>
</html>
