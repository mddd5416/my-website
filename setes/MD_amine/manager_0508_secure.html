<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | محمد أمين</title>
    <style>
        body { background: #f1f3f4; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .hidden { display: none; }
        .box { background: #fff; border: 1px solid #dadce0; padding: 32px; border-radius: 12px; width: 100%; max-width: 550px; box-shadow: 0 1px 2px rgba(60,64,67,0.3); }
        h2 { color: #202124; font-weight: 400; text-align: center; margin-bottom: 24px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #dadce0; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        input:focus { border-color: #1a73e8; outline: none; box-shadow: inset 0 0 0 1px #1a73e8; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        button:hover { background: #185abc; }
        .proj-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f1f3f4; }
        .del-btn { background: #d93025; width: auto; padding: 6px 16px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="login-section" class="box">
        <h2>ROOT LOGIN</h2>
        <input type="password" id="access-key" placeholder="كلمة المرور: MDaMiNeLD">
        <button onclick="unlock()">دخول</button>
    </div>

    <div id="admin-section" class="box hidden">
        <h2>إضافة مشروع جديد</h2>
        <input type="text" id="p-title" placeholder="اسم المشروع">
        <input type="text" id="p-type" placeholder="التصنيف (موقع، تطبيق...)">
        <input type="text" id="p-btn" placeholder="نص الزر">
        <textarea id="p-desc" placeholder="وصف المشروع..." rows="3"></textarea>
        <input type="text" id="p-link" placeholder="الرابط (مثال: google.com)">
        <input type="text" id="p-icon" placeholder="رابط الأيقونة">
        <button onclick="pushData()">حفظ ونشر</button>
        <div id="admin-list" style="margin-top: 24px;"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="Mscript.js"></script>
</body>
</html>
