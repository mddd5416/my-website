<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ROOT ACCESS // MDaMiNeLD</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .hidden { display: none; }
        .box { background: #0a0a0a; border: 1px solid #00ff41; padding: 30px; border-radius: 10px; width: 400px; }
        input, textarea { width: 100%; background: #000; border: 1px solid #333; color: #00ff41; padding: 12px; margin-bottom: 15px; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; background: #00ff41; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #status { text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-section" class="box">
        <h2 style="text-align: center;">ROOT ACCESS</h2>
        <input type="password" id="access-key" placeholder="كلمة المرور الجديدة...">
        <button onclick="unlock()">فتح النظام</button>
    </div>

    <div id="admin-section" class="box hidden">
        <h2 style="text-align: center;">إضافة مشروع</h2>
        <input type="text" id="p-title" placeholder="اسم المشروع">
        <textarea id="p-desc" placeholder="الوصف..." rows="4"></textarea>
        <input type="text" id="p-link" placeholder="رابط التحميل">
        <input type="text" id="p-tech" placeholder="التقنيات (Python, Go...)">
        <button onclick="pushData()">نشر الآن</button>
        <p id="status"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- استدعاء ملف الجافا الخاص بالمدير -->
    <script src="Mscript.js"></script>
</body>
</html>
