<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | محمد أمين</title>
    <style>
        :root { --sidebar-bg: #1a1a27; --main-bg: #151521; --accent: #3699ff; --text: #ffffff; --card: #1e1e2d; }
        body { margin: 0; display: flex; font-family: 'Segoe UI', sans-serif; background: var(--main-bg); color: var(--text); }
        
        .sidebar { width: 280px; background: var(--sidebar-bg); height: 100vh; position: fixed; right: 0; padding: 25px; border-left: 1px solid #2b2b40; }
        .sidebar-header img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 10px; }
        
        .nav-item { padding: 15px; cursor: pointer; border-radius: 12px; margin-bottom: 12px; transition: 0.3s; display: flex; align-items: center; gap: 15px; color: #a2a3b7; }
        .nav-item:hover, .nav-item.active { background: #2b2b40; color: var(--accent); }

        .main-content { margin-right: 330px; flex: 1; padding: 40px; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.5s ease; }
        
        .form-group { background: var(--card); padding: 30px; border-radius: 16px; margin-bottom: 25px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #2b2b40; border-radius: 8px; background: #151521; color: white; outline: none; }
        
        .upload-container { border: 2px dashed #2b2b40; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; }
        .preview-box img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; margin: 5px; border: 2px solid var(--accent); }

        .btn-submit { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="login-screen" style="position:fixed; inset:0; background:var(--main-bg); z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div class="form-group" style="width:360px; text-align:center;">
            <h2 style="color:var(--accent);">ROOT ACCESS</h2>
            <input type="password" id="access-key" placeholder="كلمة المرور">
            <button class="btn-submit" onclick="checkLogin()">دخول النظام</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header" style="text-align:center; margin-bottom:30px;">
            <img id="admin-avatar-sidebar" src="">
            <h3 id="admin-name-sidebar">...</h3>
        </div>
        <div class="nav-item" onclick="switchSection('profile', this)">👤 الحساب</div>
        <div class="nav-item active" onclick="switchSection('new-project', this)">➕ نشر مشروع</div>
        <div class="nav-item" onclick="switchSection('stats', this)">📊 الإحصائيات</div>
        <div class="nav-item" onclick="switchSection('manage', this)">⚙️ الإدارة</div>
    </div>

    <div class="main-content">
        <div id="new-project" class="section active">
            <div class="form-group">
                <h3>إضافة مشروع جديد</h3>
                <div style="display:flex; gap:15px;">
                    <input type="text" id="p-type" placeholder="نوع المشروع (مثل: Android)">
                    <input type="text" id="p-title" placeholder="اسم المشروع">
                </div>
                <textarea id="p-desc" placeholder="وصف المشروع بالتفصيل..." rows="6"></textarea>

                <div class="upload-container">
                    <p>أيقونة المشروع</p>
                    <button type="button" onclick="document.getElementById('icon-file').click()">رفع ملف</button>
                    <input type="file" id="icon-file" class="hidden" onchange="previewFile(this, 'icon-preview')">
                    <input type="text" id="icon-url-inp" placeholder="أو ضع رابط مباشر هنا">
                    <div id="icon-preview" class="preview-box"></div>
                </div>

                <div class="upload-container">
                    <p>صور من الداخل (Screenshots)</p>
                    <input type="file" id="screens-file" multiple onchange="previewScreenshots(this)">
                    <div id="screens-preview" class="preview-box"></div>
                </div>

                <div style="display:flex; gap:10px;">
                    <input type="text" id="p-link" placeholder="رابط التحميل">
                    <input type="text" id="p-btn-title" placeholder="عنوان الزر (اختياري)">
                </div>
                
                <button class="btn-submit" id="publish-btn" onclick="publishProject()">🚀 نشر المشروع الآن</button>
            </div>
        </div>

        <div id="stats" class="section">
            <div class="form-group">
                <h2>إجمالي النشاط</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div style="background:#151521; padding:20px; border-radius:12px; text-align:center;">
                        <h1 id="total-views">0</h1>
                        <p>زيارة إجمالية</p>
                    </div>
                    <div style="background:#151521; padding:20px; border-radius:12px; text-align:center;">
                        <h1 id="total-downloads">0</h1>
                        <p>تحميل إجمالي</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="profile" class="section">
            <div class="form-group">
                <h3>تعديل البيانات الشخصية</h3>
                <input type="text" id="edit-name" placeholder="الاسم الجديد">
                <input type="text" id="edit-avatar" placeholder="رابط صورة البروفايل">
                <button class="btn-submit" onclick="updateAdminProfile()">تحديث</button>
            </div>
        </div>

        <div id="manage" class="section">
            <h3>المشاريع المنشورة</h3>
            <div id="manage-list"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="Mscript.js"></script>
</body>
</html>
