<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>معرض مشاريع محمد أمين</title>
    <style>
        :root { --p: #00ff41; --bg: #050505; --c: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; }
        header { border-bottom: 2px solid var(--p); padding: 20px; text-align: center; box-shadow: 0 0 15px var(--p); }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: var(--c); border: 1px solid #333; padding: 20px; border-radius: 8px; transition: 0.3s; }
        .card:hover { border-color: var(--p); transform: scale(1.02); }
        .card h3 { color: var(--p); margin-top: 0; }
        .btn { display: block; background: var(--p); color: #000; text-align: center; padding: 10px; text-decoration: none; font-weight: bold; border-radius: 4px; margin-top: 15px; }
        .tag { color: #00d4ff; font-size: 12px; border: 1px solid #00d4ff; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <header><h1>M.AMINE // PROJECTS_DB</h1></header>
    <div class="container" id="projects-list">
        <!-- ستظهر المشاريع هنا تلقائياً -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // إعدادات Supabase (للقراءة فقط)
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_PUBLIC_ANON_KEY');

        async function getProjects() {
            const { data } = await supabase.from('projects').select('*');
            const list = document.getElementById('projects-list');
            if(data) {
                list.innerHTML = data.map(p => `
                    <div class="card">
                        <h3>${p.title}</h3>
                        <p>${p.desc}</p>
                        <span class="tag">${p.tech}</span>
                        <a href="${p.link}" class="btn" target="_blank">Download_Tool</a>
                    </div>
                `).join('');
            }
        }
        getProjects();
    </script>
</body>
</html>
