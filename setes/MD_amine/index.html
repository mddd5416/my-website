<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر محمد أمين</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8f9fa; --card: #ffffff; --text: #3c4043; --accent: #1a73e8; --border: #dadce0; }
        [data-theme="dark"] { --bg: #121212; --card: #1e1e1e; --text: #e8eaed; --accent: #8ab4f8; --border: #3c4043; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Google Sans', sans-serif; transition: 0.3s; margin: 0; overflow-x: hidden; }
        header { background: var(--card); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); sticky; top: 0; z-index: 1000; }

        .main-layout { display: flex; height: calc(100vh - 70px); }
        .projects-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; overflow-y: auto; }
        
        /* حل مشكلة خروج النص */
        .card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; 
            cursor: pointer; transition: 0.3s; height: fit-content; word-wrap: break-word; overflow-wrap: break-word; 
        }
        .card p { font-size: 14px; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* واجهة العرض الجانبي */
        #detail-view { flex: 1; background: var(--card); border-right: 1px solid var(--border); padding: 40px; display: none; overflow-y: auto; animation: slideIn 0.5s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .screenshot-gallery { display: flex; gap: 10px; overflow-x: auto; margin: 20px 0; padding-bottom: 10px; }
        .screenshot-gallery img { height: 200px; border-radius: 8px; border: 1px solid var(--border); flex-shrink: 0; }
        .close-btn { font-size: 24px; cursor: pointer; color: var(--accent); float: left; }
    </style>
</head>
<body data-theme="dark">
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img id="header-avatar" src="" style="width:35px; height:35px; border-radius:50%; background: #eee;">
            <span id="admin-name-display">محمد أمين</span>
        </div>
        <button onclick="toggleTheme()" style="padding: 8px 16px; border-radius: 20px; cursor: pointer;">الكلار / السومبر</button>
    </header>

    <div class="main-layout">
        <div id="detail-view">
            <span class="close-btn" onclick="closeDetail()">&times; إغلاق</span>
            <div id="detail-content"></div>
        </div>
        <div class="projects-grid" id="projects-list"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="Uscript.js"></script>
    <script>
        function toggleTheme() {
            const body = document.body;
            const theme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', theme);
        }
    </script>
</body>
</html>
