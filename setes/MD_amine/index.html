<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | محمد أمين</title>
    <style>
        :root { --sidebar-bg: #1a1a27; --main-bg: #151521; --accent: #3699ff; --text: #ffffff; --card: #1e1e2d; --input-bg: #151521; --border: #2b2b40; }
        [data-theme="light"] { --sidebar-bg: #f0f2f5; --main-bg: #ffffff; --accent: #1a73e8; --text: #1d1d1f; --card: #f8f9fa; --input-bg: #ffffff; --border: #dadce0; }
        
        body { margin: 0; display: flex; font-family: 'Segoe UI', sans-serif; background: var(--main-bg); color: var(--text); transition: 0.3s; min-height: 100vh; }
        
        /* شاشة الدخول */
        #login-screen { position: fixed; inset: 0; background: var(--main-bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 16px; border: 1px solid var(--border); width: 350px; text-align: center; }

        /* الشريط الجانبي */
        .sidebar { width: 280px; background: var(--sidebar-bg); height: 100vh; position: fixed; right: 0; padding: 25px; border-left: 1px solid var(--border); z-index: 100; }
        .sidebar-header { text-align: center; margin-bottom: 30px; }
        .sidebar-header img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; }
        
        .nav-item { padding: 14px; cursor: pointer; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; color: #a2a3b7; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: var(--accent); color: white; }

        /* المحتوى الرئيسي */
        .main-content { margin-right: 330px; flex: 1; padding: 40px; }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        
        .form-group { background: var(--card); padding: 25px; border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 10px; background: var(--input-bg); color: var(--text); outline: none; box-sizing: border-box; }
        
        .btn-submit { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-secondary { background: var(--border); color: var(--text); border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        
        .preview-box { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .preview-box img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; border: 2px solid var(--accent); }
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body data-theme="dark">

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--accent);">ROOT ACCESS</h2>
            <input type="text" id="login-user" placeholder="اسم المستخدم">
            <input type="password" id="login-pass" placeholder="كلمة المرور">
            <button class="btn-submit" onclick="checkLogin()">دخول النظام</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <img id="admin-avatar-sidebar" src="https://via.placeholder.com/80">
            <h3 id="admin-name-sidebar">محمد أمين</h3>
        </div>
        <div class="nav-item active" onclick="switchSection('new-project', this)">➕ نشر مشروع</div>
        <div class="nav-item" onclick="switchSection('profile', this)">👤 الحساب</div>
        <div class="nav-item" onclick="switchSection('stats', this)">📊 الإحصائيات</div>
        <div class="nav-item" onclick="toggleManagerTheme()">🌓 تبديل الوضع</div>
    </div>

    <div class="main-content">
        <div id="new-project" class="section active">
            <div class="form-group">
                <h3>إضافة مشروع جديد</h3>
                <input type="text" id="p-type" placeholder="نوع المشروع (مثل: تطبيقات أندرويد)">
                <input type="text" id="p-title" placeholder="اسم المشروع">
                
                <div style="border: 1px dashed var(--border); padding: 15px; border-radius: 10px; margin: 10px 0;">
                    <p>أيقونة المشروع</p>
                    <div style="display:flex; gap:10px;">
                        <button type="button" class="btn-secondary" onclick="document.getElementById('icon-file').click()">رفع ملف</button>
                        <input type="text" id="icon-url-inp" placeholder="أو ضع رابط مباشر" style="flex:1;">
                    </div>
                    <input type="file" id="icon-file" class="hidden" onchange="previewIcon(this)">
                    <div id="icon-preview" class="preview-box"></div>
                </div>

                <textarea id="p-desc" placeholder="وصف المشروع..." rows="4"></textarea>

                <div style="border: 1px dashed var(--border); padding: 15px; border-radius: 10px; margin: 10px 0;">
                    <p>صور المعرض (Screenshots)</p>
                    <button type="button" class="btn-secondary" onclick="document.getElementById('screens-file').click()">اختيار صور</button>
                    <input type="file" id="screens-file" class="hidden" multiple onchange="previewScreenshots(this)">
                    <div id="screens-preview" class="preview-box"></div>
                </div>

                <div id="links-container">
                    <p>روابط التحميل</p>
                    <div style="display:flex; gap:10px;">
                        <input type="text" class="link-url" placeholder="الرابط">
                        <input type="text" class="link-text" placeholder="نص الزر (مثلاً: تحميل)">
                        <button type="button" class="btn-secondary" onclick="addNewLinkField()">+</button>
                    </div>
                </div>

                <button class="btn-submit" id="publish-btn" onclick="publishProject()">🚀 نشر المشروع الآن</button>
            </div>
        </div>

        <div id="profile" class="section">
            <div class="form-group">
                <h3>تحديث بيانات الحساب</h3>
                <input type="file" id="new-profile-file" accept="image/*">
                <input type="text" id="edit-name" placeholder="الاسم المستعار الجديد">
                <input type="text" id="edit-user" placeholder="اسم المستخدم الجديد">
                <input type="password" id="edit-pass" placeholder="كلمة المرور الجديدة">
                <button class="btn-submit" onclick="updateAdminProfile()">حفظ التعديلات</button>
            </div>
        </div>

        <div id="stats" class="section">
            <div class="form-group">
                <h3>إحصائيات عامة</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; text-align:center;">
                    <div style="padding:20px; background:var(--input-bg); border-radius:12px; border:1px solid var(--border);">
                        <h2 id="total-views" style="color:var(--accent);">0</h2> <p>إجمالي المشاهدات</p>
                    </div>
                    <div style="padding:20px; background:var(--input-bg); border-radius:12px; border:1px solid var(--border);">
                        <h2 id="total-downloads" style="color:var(--accent);">0</h2> <p>إجمالي التحميلات</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="Mscript.js"></script>
</body>
</html>
