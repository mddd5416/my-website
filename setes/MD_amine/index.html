<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر البرمجيات | محمد أمين</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #3b82f6; --text: #1e293b; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
        .header { background: #fff; padding: 25px; text-align: center; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .app-card { background: var(--card); border: 1px solid #e2e8f0; border-radius: 20px; padding: 24px; transition: 0.3s; position: relative; display: flex; flex-direction: column; }
        .app-card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px -5px rgba(0,0,0,0.05); }
        
        .app-head { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .app-icon { width: 64px; height: 64px; border-radius: 14px; object-fit: cover; background: #f1f5f9; }
        .app-info h3 { margin: 0; font-size: 18px; }
        .app-tag { font-size: 11px; background: #dbeafe; color: var(--primary); padding: 4px 10px; border-radius: 20px; font-weight: bold; }
        
        .app-desc { font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 20px; flex-grow: 1; }
        .dl-btn { background: var(--primary); color: #fff; text-decoration: none; padding: 12px; border-radius: 10px; text-align: center; font-weight: 600; font-size: 14px; }
        
        @media (max-width: 600px) { .project-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="header">
        <h1 style="margin:0; font-size: 24px;">بوابة التطبيقات</h1>
        <p style="color:#64748b; margin: 5px 0 0;">استكشف آخر مشاريع المطور محمد أمين</p>
    </header>

    <div class="container">
        <div class="project-grid" id="client-view-grid">
            </div>
    </div>

    <script src="c-engine.js"></script>
</body>
</html>
