<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التواصل الاجتماعي | فضائي الخاص</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <div class="container">
        <div id="authContainer">
            <div class="form-box" id="loginForm">
                <h2>مرحباً بك</h2>
                <p>ابدأ رحلتك في عالمنا الخاص</p>
                
                <div id="googleBtn"></div>
                
                <div class="divider">أو عبر الحساب التقليدي</div>
                
                <div class="input-group">
                    <input type="text" id="loginUser" placeholder="اسم المستخدم">
                    <input type="password" id="loginPass" placeholder="كلمة المرور">
                </div>
                <button class="main-btn" onclick="login()">دخول</button>
                <p class="footer-text">ليس لديك حساب؟ <span class="toggle-link" onclick="toggleForm()">إنشاء حساب</span></p>
            </div>

            <div class="form-box hidden" id="signupForm">
                <h2>إنشاء حساب جديد</h2>
                <div class="input-group">
                    <input type="text" id="regUser" placeholder="اسم المستخدم الجديد">
                    <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
                    <input type="password" id="regPass" placeholder="كلمة المرور">
                </div>
                <button class="main-btn" onclick="register()">تسجيل الحساب</button>
                <p class="footer-text">لديك حساب بالفعل؟ <span class="toggle-link" onclick="toggleForm()">تسجيل الدخول</span></p>
            </div>
        </div>

        <div id="userSpace" class="form-box hidden">
            <div class="profile-card">
                <div class="img-wrapper">
                    <img id="userImg" src="https://via.placeholder.com/100" alt="صورة الشخصية">
                    <div class="online-dot"></div>
                </div>
                <h3 id="welcomeMsg">أهلاً بك</h3>
                <p id="userEmail" style="color: #94a3b8; font-size: 0.8rem;"></p>
            </div>
            
            <div class="feed-section">
                <textarea id="postText" placeholder="بماذا تفكر يا مبرمج؟"></textarea>
                <button class="post-btn" onclick="addPost()">نشر في فضائي</button>
            </div>

            <div id="postsContainer">
                </div>
            
            <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
