<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raccourci - Professional Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --accent-color: #00d2ff;
            --danger-color: #ff4b2b;
            --card-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: var(--bg-gradient); background-attachment: fixed;
            color: white; min-height: 100vh; overflow-x: hidden;
        }

        .top-controls { position: fixed; top: 20px; right: 20px; display: flex; gap: 15px; z-index: 1000; }
        .control-btn {
            width: 50px; height: 50px; background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; color: white; backdrop-filter: blur(10px);
        }
        .control-btn:hover { background: var(--accent-color); transform: translateY(-3px); }

        .sidebar {
            position: fixed; top: 0; right: -350px; width: 320px; height: 100%;
            background: rgba(15, 12, 41, 0.95); backdrop-filter: blur(20px);
            padding: 30px; transition: 0.5s; z-index: 999; border-left: 1px solid var(--glass-border);
        }
        .sidebar.active { right: 0; }

        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 40px; padding: 120px 40px; max-width: 1100px; margin: 0 auto; }
        .app-item { position: relative; display: flex; flex-direction: column; align-items: center; transition: 0.4s; }
        
        .app-icon-wrapper {
            width: 85px; height: 85px; background: var(--card-bg); border-radius: 22px;
            display: flex; align-items: center; justify-content: center; margin-bottom: 12px;
            backdrop-filter: blur(15px); border: 1px solid var(--glass-border); overflow: hidden;
        }
        .app-icon-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .primary-btn {
            width: 100%; padding: 15px; background: linear-gradient(to right, #00d2ff, #3a7bd5);
            color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }

        input {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px;
            border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: white; outline: none;
        }

        .action-btns { position: absolute; top: -15px; display: none; gap: 6px; z-index: 10; }
        .edit-mode .action-btns { display: flex; }
        .btn-small { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; }

        .path-info { font-size: 11px; opacity: 0.6; word-break: break-all; margin-top: 10px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="top-controls">
        <div class="control-btn" id="editToggle" onclick="toggleEditMode()"><i class="fas fa-pen"></i></div>
        <div class="control-btn" onclick="toggleSidebar()"><i class="fas fa-plus"></i></div>
    </div>

    <div class="sidebar" id="sidebar">
        <h2 style="margin-top:50px">الإعدادات</h2>
        <div class="path-info" id="currentPath">لم يتم تحديد مسار للملف</div>
        <button class="primary-btn" style="background: #555;" onclick="changeFilePath()">تغيير مسار التخزين</button>
        
        <hr style="opacity: 0.1; margin: 25px 0;">
        
        <h3>إضافة اختصار</h3>
        <input type="text" id="siteName" placeholder="اسم الموقع">
        <input type="url" id="siteUrl" placeholder="الرابط">
        <button class="primary-btn" onclick="addShortcut()">إضافة وحفظ</button>
    </div>

    <div class="app-grid" id="appGrid"></div>

    <script>
        let shortcuts = [];
        let isEditMode = false;
        const SERVER = "http://localhost:8000";
        let userPath = localStorage.getItem('raccourci_path');

        // جلب البيانات عند البداية
        async function init() {
            if (!userPath) {
                userPath = prompt("يرجى إدخال المسار الكامل للملف (مثال: C:/links.json):");
                if (userPath) localStorage.setItem('raccourci_path', userPath);
            }
            if (userPath) {
                document.getElementById('currentPath').innerText = "المسار: " + userPath;
                loadFromPC();
            }
        }

        async function loadFromPC() {
            try {
                const res = await fetch(`${SERVER}/get_data?path=${encodeURIComponent(userPath)}`);
                shortcuts = await res.json();
                render();
            } catch (e) { console.error("الخادم غير متصل"); }
        }

        async function syncWithPC() {
            if (!userPath) return;
            try {
                await fetch(`${SERVER}/save_data`, {
                    method: 'POST',
                    body: JSON.stringify({ path: userPath, shortcuts: shortcuts }),
                    headers: { 'Content-Type': 'application/json' }
                });
            } catch (e) { console.error("فشل الحفظ"); }
        }

        function render() {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = '';
            shortcuts.forEach((s, i) => {
                const item = document.createElement('div');
                item.className = 'app-item';
                item.innerHTML = `
                    <div class="action-btns">
                        <div class="btn-small" style="background:#3a7bd5" onclick="move(${i},-1)"><i class="fas fa-arrow-right"></i></div>
                        <div class="btn-small" style="background:var(--danger-color)" onclick="del(${i})"><i class="fas fa-times"></i></div>
                        <div class="btn-small" style="background:#3a7bd5" onclick="move(${i},1)"><i class="fas fa-arrow-left"></i></div>
                    </div>
                    <a href="${isEditMode ? '#' : s.url}" ${isEditMode ? '' : 'target="_blank"'} style="text-decoration:none; color:white; display:flex; flex-direction:column; align-items:center;">
                        <div class="app-icon-wrapper"><img src="https://www.google.com/s2/favicons?sz=128&domain=${s.url}"></div>
                        <div style="font-size:13px">${s.name}</div>
                    </a>`;
                grid.appendChild(item);
            });
        }

        function addShortcut() {
            const name = document.getElementById('siteName').value;
            let url = document.getElementById('siteUrl').value;
            if(!name || !url) return;
            url = url.startsWith('http') ? url : 'https://' + url;
            shortcuts.push({ name, url });
            render(); syncWithPC();
            document.getElementById('siteName').value = '';
            document.getElementById('siteUrl').value = '';
        }

        async function del(i) { shortcuts.splice(i, 1); render(); await syncWithPC(); }
        async function move(i, dir) {
            if(i+dir >= 0 && i+dir < shortcuts.length) {
                [shortcuts[i], shortcuts[i+dir]] = [shortcuts[i+dir], shortcuts[i]];
                render(); await syncWithPC();
            }
        }

        function changeFilePath() {
            const newPath = prompt("أدخل المسار الجديد:");
            if (newPath) {
                localStorage.setItem('raccourci_path', newPath);
                location.reload();
            }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function toggleEditMode() {
            isEditMode = !isEditMode;
            document.getElementById('editToggle').classList.toggle('active');
            document.getElementById('appGrid').classList.toggle('edit-mode');
            render();
        }

        init();
    </script>
</body>
</html>
