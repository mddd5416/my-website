<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raccourci - Custom Icons</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/880/880910.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1160/1160358.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f0c29;
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --accent-color: #00d2ff;
            --danger-color: #ff4b2b;
            --card-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .top-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 1000;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            color: white;
            font-size: 20px;
        }

        .control-btn:hover {
            background: var(--accent-color);
            transform: translateY(-3px);
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -350px;
            width: 320px;
            height: 100%;
            background: rgba(15, 12, 41, 0.95);
            backdrop-filter: blur(20px);
            padding: 30px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 999;
            border-left: 1px solid var(--glass-border);
            overflow-y: auto;
        }

        .sidebar.active { right: 0; }

        .sidebar h2 { margin-top: 60px; border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; }

        .input-group { margin: 20px 0; }

        input[type="text"], input[type="url"], input[type="file"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        .file-input-wrapper {
            margin: 10px 0;
            padding: 10px;
            border: 1px dashed var(--accent-color);
            border-radius: 10px;
            text-align: center;
        }

        .add-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 40px;
            padding: 120px 40px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .app-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-icon-wrapper {
            width: 85px;
            height: 85px;
            background: var(--card-bg);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            transition: 0.4s;
            overflow: hidden;
        }

        .app-icon-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .delete-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--danger-color);
            color: white;
            border: 2px solid #fff;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }

        .edit-mode .delete-btn { display: flex; }
        .edit-mode .app-item { animation: wobble 0.3s infinite; }

        @keyframes wobble {
            0% { transform: rotate(1deg); }
            50% { transform: rotate(-1deg); }
            100% { transform: rotate(1deg); }
        }
    </style>
</head>
<body>

    <div class="top-controls">
        <div class="control-btn" id="editToggle" onclick="toggleEditMode()"><i class="fas fa-pen"></i></div>
        <div class="control-btn menu-trigger" onclick="toggleSidebar()"><i class="fas fa-plus"></i></div>
    </div>

    <div class="sidebar" id="sidebar">
        <h2>إضافة اختصار</h2>
        <div class="input-group">
            <input type="text" id="siteName" placeholder="اسم الموقع">
            <input type="url" id="siteUrl" placeholder="الرابط (https://...)">
            
            <hr style="opacity: 0.1; margin: 20px 0;">
            <label style="font-size: 14px; color: var(--accent-color);">الأيقونة:</label>
            
            <input type="url" id="siteIconUrl" placeholder="رابط صورة من الإنترنت">
            
            <p style="text-align: center; margin: 5px 0; font-size: 12px; opacity: 0.5;">أو</p>
            
            <div class="file-input-wrapper">
                <input type="file" id="siteIconFile" accept="image/*" style="font-size: 12px;">
                <small style="display:block; opacity: 0.7;">اختر صورة من حاسوبك</small>
            </div>
        </div>
        <button class="add-btn" onclick="processAndAdd()">إضافة للوحة</button>
    </div>

    <div class="app-grid" id="appGrid"></div>

    <script>
        let shortcuts = JSON.parse(localStorage.getItem('myShortcuts')) || [];
        let isEditMode = false;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('editToggle');
            const grid = document.getElementById('appGrid');
            btn.innerHTML = isEditMode ? '<i class="fas fa-check"></i>' : '<i class="fas fa-pen"></i>';
            btn.style.background = isEditMode ? 'var(--danger-color)' : 'var(--card-bg)';
            grid.classList.toggle('edit-mode');
        }

        // دالة لمعالجة الصورة سواء كانت ملف أو رابط
        async function processAndAdd() {
            const name = document.getElementById('siteName').value;
            let url = document.getElementById('siteUrl').value;
            const iconUrl = document.getElementById('siteIconUrl').value;
            const iconFile = document.getElementById('siteIconFile').files[0];

            if (!name || !url) { alert("يرجى إدخال الاسم والرابط"); return; }
            if (!url.startsWith('http')) url = 'https://' + url;

            let finalIcon = `https://www.google.com/s2/favicons?sz=128&domain=${url}`;

            if (iconFile) {
                // تحويل الصورة المرفوعة إلى Base64
                const reader = new FileReader();
                reader.onload = function(e) {
                    addShortcut(name, url, e.target.result);
                };
                reader.readAsDataURL(iconFile);
            } else if (iconUrl.trim() !== "") {
                addShortcut(name, url, iconUrl);
            } else {
                addShortcut(name, url, finalIcon);
            }
        }

        function addShortcut(name, url, icon) {
            const newShortcut = { id: Date.now(), name, url, icon };
            shortcuts.push(newShortcut);
            saveAndRender();
            
            // إعادة ضبط الحقول
            document.getElementById('siteName').value = '';
            document.getElementById('siteUrl').value = '';
            document.getElementById('siteIconUrl').value = '';
            document.getElementById('siteIconFile').value = '';
            toggleSidebar();
        }

        function deleteShortcut(id) {
            shortcuts = shortcuts.filter(s => s.id !== id);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('myShortcuts', JSON.stringify(shortcuts));
            render();
        }

        function render() {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = '';
            shortcuts.forEach(s => {
                grid.innerHTML += `
                    <div class="app-item">
                        <div class="delete-btn" onclick="deleteShortcut(${s.id})"><i class="fas fa-times"></i></div>
                        <a href="${s.url}" target="_blank" style="text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center;">
                            <div class="app-icon-wrapper">
                                <img src="${s.icon}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1243/1243966.png'">
                            </div>
                            <div class="app-name">${s.name}</div>
                        </a>
                    </div>
                `;
            });
        }

        render();
    </script>
</body>
</html>
