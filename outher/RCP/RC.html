<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raccourci App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00d2ff; --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.12); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); background-attachment: fixed; color: white; min-height: 100vh; }
        
        .controls { position: fixed; top: 30px; right: 30px; display: flex; gap: 15px; z-index: 1000; }
        .btn-ui { width: 55px; height: 55px; background: var(--glass); border: 1px solid var(--border); border-radius: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; backdrop-filter: blur(15px); color: white; }
        .btn-ui:hover { background: var(--accent); transform: translateY(-3px); }

        .sidebar { position: fixed; top: 0; right: -360px; width: 320px; height: 100%; background: rgba(10, 10, 25, 0.95); backdrop-filter: blur(30px); padding: 50px 25px; transition: 0.5s; z-index: 999; border-left: 1px solid var(--border); }
        .sidebar.active { right: 0; }

        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 50px; padding: 140px 60px; max-width: 1200px; margin: 0 auto; }
        .app-item { position: relative; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .icon-wrapper { width: 95px; height: 95px; background: var(--glass); border-radius: 26px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; margin-bottom: 15px; overflow: hidden; backdrop-filter: blur(10px); }
        .icon-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .edit-mode .app-item { animation: wobble 0.3s infinite ease-in-out; }
        @keyframes wobble { 0% {transform:rotate(1.5deg)} 50% {transform:rotate(-1.5deg)} 100% {transform:rotate(1.5deg)} }
        
        .actions { position: absolute; top: -12px; display: none; gap: 8px; z-index: 50; }
        .edit-mode .actions { display: flex; }
        .btn-sm { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; outline: none; }
        .btn-main { width: 100%; padding: 15px; background: linear-gradient(45deg, #00d2ff, #3a7bd5); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .path-display { margin-top: 25px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 10px; font-size: 11px; color: var(--accent); word-break: break-all; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="controls">
        <div class="btn-ui" id="editToggle" onclick="toggleEdit()"><i class="fas fa-pen"></i></div>
        <div class="btn-ui" onclick="toggleSide()"><i class="fas fa-plus"></i></div>
    </div>

    <div class="sidebar" id="sidebar">
        <h2 style="text-align:center;">الإعدادات</h2>
        
        <button class="btn-main" style="background: #444;" onclick="pickFile()">📁 اختيار ملف الحفظ (JSON)</button>
        <div class="path-display" id="pathTxt">المسار: لم يتم الاختيار</div>
        
        <hr style="opacity: 0.1; margin: 30px 0;">
        
        <h3 style="text-align:center;">إضافة اختصار</h3>
        <input type="text" id="name" placeholder="اسم الموقع">
        <input type="text" id="url" placeholder="الرابط (google.com)">
        <input type="text" id="icon" placeholder="رابط الأيقونة أو مسار محلي (اختياري)">
        <button class="btn-main" onclick="add()">إضافة وحفظ</button>
    </div>

    <div class="app-grid" id="grid"></div>

    <script>
        let shortcuts = [];
        let isEdit = false;
        let filePath = localStorage.getItem('user_json_path') || '';
        const API = "http://localhost:8000";

        async function init() {
            if (filePath) {
                document.getElementById('pathTxt').innerText = "المسار: " + filePath;
                loadData();
            }
        }

        async function pickFile() {
            try {
                const r = await fetch(`${API}/pick_file`);
                const data = await r.json();
                if (data.path) {
                    filePath = data.path;
                    localStorage.setItem('user_json_path', filePath);
                    document.getElementById('pathTxt').innerText = "المسار: " + filePath;
                    loadData();
                }
            } catch(e) { alert("تأكد من تشغيل server.py"); }
        }

        async function loadData() {
            if (!filePath) return;
            const r = await fetch(`${API}/get_data?path=${encodeURIComponent(filePath)}`);
            shortcuts = await r.json();
            render();
        }

        async function sync() {
            if (!filePath) return;
            await fetch(`${API}/save_data`, {
                method: 'POST',
                body: JSON.stringify({ path: filePath, content: shortcuts })
            });
        }

        function render() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            shortcuts.forEach((s, i) => {
                const item = document.createElement('div');
                item.className = 'app-item';
                const iconSrc = s.icon || `https://www.google.com/s2/favicons?sz=128&domain=${s.url}`;
                item.innerHTML = `
                    <div class="actions">
                        <div class="btn-sm" style="background:#3a7bd5" onclick="move(${i},-1)"><i class="fas fa-chevron-right"></i></div>
                        <div class="btn-sm" style="background:#ff4b2b" onclick="del(${i})"><i class="fas fa-trash"></i></div>
                        <div class="btn-sm" style="background:#3a7bd5" onclick="move(${i},1)"><i class="fas fa-chevron-left"></i></div>
                    </div>
                    <a href="${isEdit ? '#' : s.url}" ${isEdit ? '' : 'target="_blank"'} style="text-decoration:none; color:white; text-align:center;">
                        <div class="icon-wrapper"><img src="${iconSrc}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1243/1243966.png'"></div>
                        <div style="font-weight:500;">${s.name}</div>
                    </a>`;
                g.appendChild(item);
            });
        }

        function add() {
            const n = document.getElementById('name').value, u = document.getElementById('url').value, ic = document.getElementById('icon').value;
            if(!n || !u) return;
            shortcuts.push({name: n, url: u.startsWith('http') ? u : 'https://'+u, icon: ic});
            render(); sync(); toggleSide();
            document.getElementById('name').value = ''; document.getElementById('url').value = ''; document.getElementById('icon').value = '';
        }

        function del(i) { shortcuts.splice(i, 1); render(); sync(); }
        function move(i, d) { if(i+d>=0 && i+d<shortcuts.length) { [shortcuts[i], shortcuts[i+d]] = [shortcuts[i+d], shortcuts[i]]; render(); sync(); } }
        function toggleSide() { document.getElementById('sidebar').classList.toggle('active'); }
        function toggleEdit() { isEdit = !isEdit; document.getElementById('editToggle').style.background = isEdit ? "#ff4b2b" : ""; document.getElementById('grid').classList.toggle('edit-mode'); render(); }

        init();
    </script>
</body>
</html>
