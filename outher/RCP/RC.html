<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raccourci App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* الأساسيات وضمان عدم خروج العناصر */
        :root {
            --accent: #00d2ff;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --sidebar-bg: rgba(10, 10, 25, 0.96);
        }

        * { box-sizing: border-box; } /* الحل النهائي لخروج الحقول عن الديف */

        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-attachment: fixed; color: white; min-height: 100vh;
            overflow-x: hidden;
        }

        /* أزرار التحكم */
        .controls { position: fixed; top: 25px; right: 25px; display: flex; gap: 15px; z-index: 1000; }
        .btn-ui {
            width: 50px; height: 50px; background: var(--glass); border: 1px solid var(--border);
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; backdrop-filter: blur(15px); color: white;
        }
        .btn-ui:hover { background: var(--accent); transform: translateY(-3px); }

        /* القائمة الجانبية */
        .sidebar {
            position: fixed; top: 0; right: -360px; width: 330px; height: 100%;
            background: var(--sidebar-bg); backdrop-filter: blur(30px);
            padding: 40px 25px; transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1);
            z-index: 999; border-left: 1px solid var(--border);
            overflow-y: auto;
        }
        .sidebar.active { right: 0; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; font-weight: 300; }

        /* تنسيق المدخلات */
        .field-group { width: 100%; margin-bottom: 18px; }
        input {
            width: 100%; padding: 14px; border-radius: 12px;
            border: 1px solid var(--border); background: rgba(255,255,255,0.05);
            color: white; outline: none; font-size: 14px; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }

        .btn-main {
            width: 100%; padding: 14px; background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border: none; border-radius: 12px; color: white; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }

        /* إدارة البيانات */
        .backup-section { margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px; }
        .backup-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-sec {
            flex: 1; padding: 12px; background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            border-radius: 10px; color: white; font-size: 11px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-sec:hover { background: var(--accent); }

        /* شبكة الأيقونات */
        .app-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 40px; padding: 130px 40px; max-width: 1200px; margin: 0 auto;
        }

        .app-item { position: relative; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .icon-box {
            width: 85px; height: 85px; background: var(--glass); border-radius: 24px;
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px; overflow: hidden; backdrop-filter: blur(10px);
        }
        .icon-box img { width: 100%; height: 100%; object-fit: cover; }

        /* وضع التعديل */
        .edit-mode .app-item { animation: wobble 0.3s infinite ease-in-out; }
        .actions { position: absolute; top: -10px; display: none; gap: 5px; z-index: 50; }
        .edit-mode .actions { display: flex; }
        .btn-sm { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; color: white; }

        @keyframes wobble { 0% {transform:rotate(1deg)} 50% {transform:rotate(-1deg)} 100% {transform:rotate(1deg)} }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="btn-ui" id="editBtn" onclick="toggleEdit()"><i class="fas fa-edit"></i></div>
        <div class="btn-ui" onclick="toggleSide()"><i class="fas fa-plus"></i></div>
    </div>

    <div class="sidebar" id="sidebar">
        <h2>إضافة اختصار</h2>
        <div class="field-group"><input type="text" id="name" placeholder="اسم الموقع"></div>
        <div class="field-group"><input type="text" id="url" placeholder="الرابط (google.com)"></div>
        <div class="field-group"><input type="text" id="icon" placeholder="رابط الأيقونة (اختياري)"></div>
        <button class="btn-main" onclick="add()">إضافة وحفظ</button>

        <div class="backup-section">
            <h3 style="font-size: 14px; text-align: center; opacity: 0.7;">تصدير واستيراد البيانات</h3>
            <div class="backup-btns">
                <button class="btn-sec" onclick="exportToFile()"><i class="fas fa-save"></i> حفظ في مكان محدد</button>
                <button class="btn-sec" onclick="document.getElementById('fileIn').click()"><i class="fas fa-upload"></i> استيراد</button>
            </div>
            <input type="file" id="fileIn" style="display:none" onchange="importData(event)">
        </div>
    </div>

    <div class="app-grid" id="grid"></div>

    <script>
        let shortcuts = [];
        let isEdit = false;

        function init() {
            const saved = localStorage.getItem('elite_db_v4');
            if (saved) { shortcuts = JSON.parse(saved); render(); }
        }

        function save() { localStorage.setItem('elite_db_v4', JSON.stringify(shortcuts)); }

        function render() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            shortcuts.forEach((s, i) => {
                const item = document.createElement('div');
                item.className = 'app-item';
                const iconSrc = s.icon || `https://www.google.com/s2/favicons?sz=128&domain=${s.url}`;
                item.innerHTML = `
                    <div class="actions">
                        <div class="btn-sm" style="background:#3a7bd5" onclick="move(${i},-1)"><i class="fas fa-chevron-right"></i></div>
                        <div class="btn-sm" style="background:#ff4b2b" onclick="del(${i})"><i class="fas fa-trash"></i></div>
                        <div class="btn-sm" style="background:#3a7bd5" onclick="move(${i},1)"><i class="fas fa-chevron-left"></i></div>
                    </div>
                    <a href="${isEdit ? '#' : s.url}" ${isEdit ? '' : 'target="_blank"'} style="text-decoration:none; color:white; text-align:center;">
                        <div class="icon-box"><img src="${iconSrc}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1243/1243966.png'"></div>
                        <div style="font-size: 13px; font-weight: 500;">${s.name}</div>
                    </a>`;
                g.appendChild(item);
            });
        }

        function add() {
            const n = document.getElementById('name').value, u = document.getElementById('url').value, ic = document.getElementById('icon').value;
            if(!n || !u) return;
            shortcuts.push({name: n, url: u.startsWith('http') ? u : 'https://'+u, icon: ic});
            save(); render(); toggleSide();
            document.getElementById('name').value = ''; document.getElementById('url').value = ''; document.getElementById('icon').value = '';
        }

        function del(i) { shortcuts.splice(i, 1); save(); render(); }
        function move(i, d) { if(i+d>=0 && i+d<shortcuts.length) { [shortcuts[i], shortcuts[i+d]] = [shortcuts[i+d], shortcuts[i]]; save(); render(); } }
        
        // ميزة فتح نافذة الويندوز لاختيار مكان الحفظ
        async function exportToFile() {
            const data = JSON.stringify(shortcuts, null, 2);
            if ('showSaveFilePicker' in window) {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: 'my_links.json',
                        types: [{ description: 'JSON File', accept: {'application/json': ['.json']} }]
                    });
                    const writable = await handle.createWritable();
                    await writable.write(data);
                    await writable.close();
                } catch (e) { console.log("User canceled"); }
            } else {
                const blob = new Blob([data], {type: 'application/json'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'my_links.json';
                a.click();
            }
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    shortcuts = JSON.parse(e.target.result);
                    save(); render(); alert("تم الاستيراد!");
                } catch(err) { alert("خطأ في الملف!"); }
            };
            reader.readAsText(file);
        }

        function toggleSide() { document.getElementById('sidebar').classList.toggle('active'); }
        function toggleEdit() {
            isEdit = !isEdit;
            document.getElementById('editBtn').style.background = isEdit ? "#ff4b2b" : "";
            document.getElementById('grid').classList.toggle('edit-mode');
            render();
        }

        init();
    </script>
</body>
</html>
